{% extends "base.html" %}
{% block title %}Login — ShopWave{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to your ShopWave account</p>
    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required placeholder="demo" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="demo123">
      </div>
      <button type="submit" class="btn btn--primary btn--full">Sign In</button>
    </form>
    <div class="auth-hint">
      <strong>Demo accounts:</strong><br>
      username: <code>demo</code> / password: <code>demo123</code><br>
      username: <code>admin</code> / password: <code>admin123</code>
    </div>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
  </div>
</div>
{% endblock %}
